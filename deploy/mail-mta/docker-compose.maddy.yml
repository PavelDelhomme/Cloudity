# Stack Maddy — Portainer / VPS (séparée du compose Cloudity principal).
# Copier .env.example → .env (hors Git). Aucune valeur par défaut dans ce fichier.
# Ne pas passer SMTP/IMAP par Nginx Proxy Manager : ports exposés sur l’hôte.

services:
  maddy:
    image: foxcpp/maddy:latest
    container_name: cloudity-maddy
    hostname: ${MADDY_HOSTNAME}
    restart: unless-stopped
    environment:
      MADDY_HOSTNAME: ${MADDY_HOSTNAME}
      MADDY_DOMAIN: ${MADDY_DOMAIN}
      MAIL_DIRECTORY_URL: ${MAIL_DIRECTORY_URL}
      MTA_INTERNAL_TOKEN: ${MTA_INTERNAL_TOKEN}
    ports:
      - "${SMTP_PORT}:25"
      - "${IMAP_PORT}:143"
      - "${SMTPS_PORT}:465"
      - "${SUBMISSION_PORT}:587"
      - "${IMAPS_PORT}:993"
    volumes:
      - maddy_data:/data
      - ./maddy/maddy.conf:/data/maddy.conf:ro
      - ./scripts:/scripts:ro
      - ${MADDY_CERTS_PATH}:/data/tls:ro
    networks:
      - mta_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "ss -ltn | grep -E ':(25|143|465|587|993) ' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  mta_net:
    name: ${MADDY_DOCKER_NETWORK}
    external: true

volumes:
  maddy_data:
