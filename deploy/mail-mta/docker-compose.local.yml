# Stack MTA — tests locaux (SMTP entrant sur 2526, pas de conflit avec le port 25 système).
# Usage : cp .env.local.example .env && docker compose -f docker-compose.local.yml up -d
# Prérequis : mail-directory-service joignable (stack Cloudity `make up`).

services:
  alias-router:
    build:
      context: ./alias-router
    container_name: cloudity-alias-router-local
    restart: unless-stopped
    env_file: .env
    environment:
      ALIAS_ROUTER_LISTEN_ADDR: :2527
      MAIL_DIRECTORY_URL: ${MAIL_DIRECTORY_URL:-http://host.docker.internal:6050}
      MTA_INTERNAL_TOKEN: ${MTA_INTERNAL_TOKEN}
      RELAY_SMTP_HOST: ${RELAY_SMTP_HOST:-host.docker.internal}
      RELAY_SMTP_PORT: ${RELAY_SMTP_PORT:-1025}
      RELAY_SMTP_USERNAME: ${RELAY_SMTP_USERNAME:-}
      RELAY_SMTP_PASSWORD: ${RELAY_SMTP_PASSWORD:-}
      RELAY_FROM: ${RELAY_FROM:-}
    networks:
      - mta_local
    extra_hosts:
      - "host.docker.internal:host-gateway"

  maddy:
    image: foxcpp/maddy:latest
    container_name: cloudity-maddy-local
    hostname: ${MADDY_HOSTNAME:-mail.alias.example.invalid}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${SMTP_PORT:-2525}:25"
      - "${SUBMISSION_PORT:-2587}:587"
    volumes:
      - maddy_data:/data
      - ./maddy/maddy.conf:/data/maddy.conf:ro
      - ./scripts:/scripts:ro
    networks:
      - mta_local
    depends_on:
      - alias-router
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  mta_local:
    name: cloudity-mta-local

volumes:
  maddy_data:
