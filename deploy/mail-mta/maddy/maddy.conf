# Maddy — réception domaine alias (squelette Cloudity).
# Remplacer alias.example.invalid par <domaine-alias> dans .env (hors Git).
# Livraison : script lookup Cloudity puis relais SMTP vers boîte cible.

tls off

$(local_domains) = {env:MADDY_DOMAIN} {env:MADDY_HOSTNAME}
$(primary_domain) = {env:MADDY_DOMAIN}

smtp tcp://0.0.0.0:25 {
    hostname {env:MADDY_HOSTNAME}
    destination $(primary_domain) {
        # Smoke local : accepte le domaine alias. Le lookup/routage réel est
        # validé par scripts/alias-deliver.sh et /mail/internal/alias-resolve.
        deliver_to dummy
    }
    default_destination {
        reject 550 5.1.1 "Domaine alias inconnu"
    }
}

# Soumission sortante désactivée en local tant que le relais fournisseur
# n'est pas câblé explicitement. Le smoke MTA porte uniquement sur SMTP 25/2526.
