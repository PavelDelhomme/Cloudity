# Maddy — réception domaine alias (squelette Cloudity).
# Remplacer alias.example.invalid par <domaine-alias> dans .env (hors Git).
# Livraison : script lookup Cloudity puis relais SMTP vers boîte cible.

tls off

$(local_domains) = $(expandenv MADDY_DOMAIN) $(expandenv MADDY_HOSTNAME)
$(primary_domain) = $(expandenv MADDY_DOMAIN)

smtp tcp://0.0.0.0:25 {
    tls off
    deliver_to &local_relay
}

table.local_relay {
    $(primary_domain) {
        destination = pipe /scripts/alias-deliver.sh
    }
}

# Soumission sortante (tests locaux) — relais vers le fournisseur IMAP/SMTP si configuré.
submission tcp://0.0.0.0:587 {
    tls off
    auth off
    deliver_to &remote_queue
}

queue remote_queue {
    target remote
}
