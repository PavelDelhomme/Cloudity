# Couche sécurité Cloudity (optionnelle) :
#   - step-ca : PKI interne pour le mTLS entre microservices.
# Activée via `make mtls-up`. Voir docs/securite/MTLS-INTERNE.md pour le plan complet.
#
# Usage manuel :
#   docker compose -f docker-compose.yml -f docker-compose.security.yml up -d step-ca
#
# Le mot de passe de la CA est lu depuis ./infrastructure/step-ca/secrets/ca-password
# (ignoré par git). Tant qu'il n'existe pas, `step ca init` échoue : faire :
#   echo "$(openssl rand -base64 32)" > infrastructure/step-ca/secrets/ca-password

services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: cloudity-step-ca
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: "Cloudity Internal"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "cloudity-jwt"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: "/secrets/ca-password"
    volumes:
      - step_ca_data:/home/step
      - ./infrastructure/step-ca/secrets:/secrets:ro
    ports:
      # Exposé uniquement en dev/preprod ; en prod, garder accessible
      # uniquement via le réseau Docker.
      - "6443:9000"
    healthcheck:
      test: ["CMD-SHELL", "step ca health --ca-url https://localhost:9000 --root /home/step/certs/root_ca.crt | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - cloudity-network

  # Sidecar de rotation des certs internes (cert-renewer).
  # Boucle infinie qui appelle `step ca renew` sur chaque cert présent dans
  # infrastructure/step-ca/issued/<svc>/. Renouvelle quand il reste ≤ 6 h
  # de validité ; intervalle de scan = 10 min.
  #
  # Activation : démarré automatiquement avec la couche security (`make
  # mtls-up`). Arrêt avec `make mtls-down`. Fonctionne sans secrets sur
  # disque : `step ca renew` s'authentifie avec le cert+clé existants.
  #
  # Voir docs/securite/MTLS-INTERNE.md § Rotation.
  cert-renewer:
    image: smallstep/step-ca:latest
    container_name: cloudity-cert-renewer
    restart: unless-stopped
    depends_on:
      step-ca:
        condition: service_healthy
    environment:
      STEP_CA_URL: "https://step-ca:9000"
      CERT_RENEW_INTERVAL: "600"
      CERT_EXPIRES_IN: "6h"
    volumes:
      - ./infrastructure/step-ca/issued:/certs/issued
      - ./infrastructure/step-ca/cert-renewer/renew-loop.sh:/usr/local/bin/renew-loop.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/renew-loop.sh"]
    user: "0:0"  # accès aux fichiers chown postgres/redis (uid 70 / 999)
    # Désactive le healthcheck hérité de l'image step-ca (pas de serveur CA local).
    # La supervision se fait via les logs (`make cert-renewer-status`).
    healthcheck:
      disable: true
    networks:
      - cloudity-network

volumes:
  step_ca_data:
    driver: local
    name: cloudity-step-ca-data

networks:
  cloudity-network:
    external: true
    name: cloudity-network
