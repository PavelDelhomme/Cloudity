<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Cloudity Pass — Paramètres</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Cloudity Pass — Paramètres</h1>
      <section>
        <label>
          URL du gateway Cloudity
          <input id="gateway-url" type="url" placeholder="https://api.cloudity.example" />
        </label>
        <button id="save-gateway">Enregistrer</button>
        <p id="status" class="hint" hidden></p>
      </section>
      <section class="hint todo">
        <p>
          v0.2.0 : l’URL du gateway est requise ici ; la <strong>connexion Cloudity</strong> et le
          <strong>mot de passe maître</strong> (init / déverrouillage après sonde
          <code>GET /pass/vaults</code>) se font dans le <strong>popup</strong> de l’extension.
          Autofill et liste d’entrées : <code>MP-06</code>.
        </p>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
