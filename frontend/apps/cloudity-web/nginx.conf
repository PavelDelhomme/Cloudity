# MPA Cloudity : shell utilisateur (index.html) + back-office (admin.html) pour /4dm1n.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy : limite l'accès aux APIs sensibles côté navigateur.
    # Ajustez si une feature (caméra/micro pour visio futur, géoloc, etc.) est nécessaire.
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;

    # === En-têtes à activer derrière TLS (prod / preprod) ============================
    # NE PAS activer HSTS en HTTP ou tant que TLS n'est pas garanti : cela bloquerait
    # le service en clair sur le domaine pour la durée du max-age (cf. docs/securite/SECURITE.md §8.3).
    # Une fois TLS 1.3 strict + redirection 80→443 en place :
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Après plusieurs semaines sans incident, ajouter "; preload" et soumettre à hstspreload.org.
    #
    # Content-Security-Policy : commencer en mode rapport pour ne rien casser, puis durcir.
    # Remplacer __API_ORIGIN__ par l'origine effective de l'api-gateway (ex. https://api.cloudity.example.com).
    # Pour le mail HTML / aperçus Drive, prévoir éventuellement des origines additionnelles.
    # add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' __API_ORIGIN__; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' __API_ORIGIN__; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
    # =================================================================================

    location = /favicon.ico {
        return 302 /favicon.svg;
    }

    location /4dm1n {
        try_files $uri $uri/ /admin.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
