# SPA Cloudity : toutes les routes (/, /app, /app/mail, /admin, …) servent index.html.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # En-têtes de base (compléter TLS / HSTS au reverse-proxy en production)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Les navigateurs demandent souvent /favicon.ico en plus du <link rel="icon">
    location = /favicon.ico {
        return 302 /favicon.svg;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
