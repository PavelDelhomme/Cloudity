services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: cloudity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudity_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudity_secure_password_2025}
      POSTGRES_DB: ${POSTGRES_DB:-cloudity}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6042:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgresql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudity_admin} -d ${POSTGRES_DB:-cloudity}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudity-network

  # Redis pour cache et sessions (mot de passe développé via shell)
  redis:
    image: redis:7-alpine
    container_name: cloudity-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password_2025}
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"]
    ports:
      - "6079:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudity-network

  # Service d'authentification Go
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-auth-service
    restart: unless-stopped
    ports:
      - "6081:8081"
    environment:
      - PORT=8081
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
      - REDIS_URL=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password_2025}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_this_in_production_2025}
      - GO_ENV=development
    volumes:
      - ./backend/auth-service:/app:cached
      - go_mod_cache_auth:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cloudity-network

  # API Gateway Go
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile.dev
    container_name: cloudity-api-gateway
    restart: unless-stopped
    ports:
      - "6000:8000"
    environment:
      - PORT=8000
      - AUTH_SERVICE_URL=http://auth-service:8081
      - ADMIN_SERVICE_URL=http://admin-service:8082
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_this_in_production_2025}
      - GO_ENV=development
    volumes:
      - ./backend/api-gateway:/app:cached
      - ./backend/auth-service:/app/keys:ro
      - go_mod_cache_gateway:/go/pkg/mod
    depends_on:
      auth-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      password-manager:
        condition: service_healthy
      mail-directory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cloudity-network

  # Service d'administration Python/FastAPI
  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-admin-service
    restart: unless-stopped
    ports:
      - "6082:8082"
    environment:
      - PORT=8082
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}
      - REDIS_URL=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password_2025}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_this_in_production_2025}
      - PYTHON_ENV=development
    volumes:
      - ./backend/admin-service:/app:cached
      - python_cache:/root/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cloudity-network

  # Password Manager (Phase 1) — vaults/items chiffrés côté client
  password-manager:
    build:
      context: ./backend/password-manager
      dockerfile: Dockerfile.dev
    container_name: cloudity-password-manager
    restart: unless-stopped
    ports:
      - "6051:8051"
    environment:
      - PORT=8051
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/password-manager:/app:cached
      - go_mod_cache_pass:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cloudity-network

  # Mail Directory (Phase 2) — domaines, boîtes, alias
  mail-directory-service:
    build:
      context: ./backend/mail-directory-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-mail-directory-service
    restart: unless-stopped
    ports:
      - "6050:8050"
    environment:
      - PORT=8050
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/mail-directory-service:/app:cached
      - go_mod_cache_mail:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cloudity-network

  # Dashboard d'administration React
  admin-dashboard:
    build:
      context: ./frontend/admin-dashboard
      dockerfile: Dockerfile.dev
    container_name: cloudity-admin-dashboard
    restart: unless-stopped
    ports:
      - "6001:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend/admin-dashboard:/app:cached
      - node_modules_cache:/app/node_modules
    depends_on:
      - api-gateway
    networks:
      - cloudity-network

  # Adminer pour gestion base de données (développement)
  adminer:
    image: adminer:4-standalone
    container_name: cloudity-adminer
    restart: unless-stopped
    ports:
      - "6083:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      - postgres
    networks:
      - cloudity-network
    profiles:
      - dev

  # Redis Commander (dev) : connexion au service redis du réseau Docker (host=redis, pas localhost)
  # Format REDIS_HOSTS = label:host:port:db:password (voir entrypoint joeferner/redis-commander)
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: cloudity-redis-commander
    restart: unless-stopped
    ports:
      - "6084:8081"
    environment:
      # Obligatoire : host "redis" = nom du service sur le réseau Docker (sinon l'image utilise localhost)
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_secure_password_2025}"
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cloudity-network
    profiles:
      - dev

networks:
  cloudity-network:
    driver: bridge
    name: cloudity-network

volumes:
  postgres_data:
    driver: local
    name: cloudity-postgres-data
  redis_data:
    driver: local
    name: cloudity-redis-data
  go_mod_cache_auth:
    driver: local
    name: cloudity-go-mod-cache-auth
  go_mod_cache_gateway:
    driver: local
    name: cloudity-go-mod-cache-gateway
  python_cache:
    driver: local
    name: cloudity-python-cache
  node_modules_cache:
    driver: local
    name: cloudity-node-modules-cache
  go_mod_cache_pass:
    driver: local
    name: cloudity-go-mod-cache-pass
  go_mod_cache_mail:
    driver: local
    name: cloudity-go-mod-cache-mail