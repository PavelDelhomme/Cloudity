services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: cloudity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudity_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudity_secure_password_2025}
      POSTGRES_DB: ${POSTGRES_DB:-cloudity}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6042:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgresql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudity_admin} -d ${POSTGRES_DB:-cloudity}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudity-network

  # Redis pour cache et sessions (mot de passe développé via shell)
  redis:
    image: redis:7-alpine
    container_name: cloudity-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password_2025}
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"]
    ports:
      - "6079:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudity-network

  # Migrations DB : applique automatiquement les scripts dans infrastructure/postgresql/migrations/
  # (ex. 04-schema-drive.sql, 20250225_mail_schema.sql). Les services qui utilisent la DB en dépendent.
  db-migrate:
    image: postgres:15-alpine
    container_name: cloudity-db-migrate
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-cloudity_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudity_secure_password_2025}
      POSTGRES_DB: ${POSTGRES_DB:-cloudity}
    volumes:
      - ./scripts:/scripts:ro
      - ./infrastructure/postgresql/migrations:/migrations:ro
    command: ["/bin/sh", "/scripts/migrate-db.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudity-network

  # Service d'authentification Go
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-auth-service
    restart: unless-stopped
    ports:
      - "6081:8081"
    environment:
      - PORT=8081
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
      - REDIS_URL=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password_2025}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_this_in_production_2025}
      - GO_ENV=development
    volumes:
      - ./backend/auth-service:/app:cached
      - go_mod_cache_auth:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8081/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - cloudity-network

  # API Gateway Go
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile.dev
    container_name: cloudity-api-gateway
    restart: unless-stopped
    ports:
      - "6080:8000"
    environment:
      - PORT=8000
      - AUTH_SERVICE_URL=http://auth-service:8081
      - ADMIN_SERVICE_URL=http://admin-service:8082
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_this_in_production_2025}
      - GO_ENV=development
      # Autorise CORS depuis le réseau local (ex. smartphone : http://<TON_IP>:6001)
      - CORS_ALLOW_LAN=${CORS_ALLOW_LAN:-true}
      - GOTOOLCHAIN=auto
    volumes:
      - ./backend/api-gateway:/app:cached
      - ./backend/auth-service:/app/keys:ro
      - go_mod_cache_gateway:/go/pkg/mod
    depends_on:
      auth-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      password-manager:
        condition: service_healthy
      mail-directory-service:
        condition: service_healthy
      drive-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 180s
    networks:
      - cloudity-network

  # Service d'administration Python/FastAPI
  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-admin-service
    restart: unless-stopped
    ports:
      - "6082:8082"
    environment:
      - PORT=8082
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}
      - REDIS_URL=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password_2025}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_this_in_production_2025}
      - PYTHON_ENV=development
    volumes:
      - ./backend/admin-service:/app:cached
      - python_cache:/root/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8082/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    networks:
      - cloudity-network

  # Password Manager (Phase 1) — vaults/items chiffrés côté client
  password-manager:
    build:
      context: ./backend/password-manager
      dockerfile: Dockerfile.dev
    container_name: cloudity-password-manager
    restart: unless-stopped
    ports:
      - "6051:8051"
    environment:
      - PORT=8051
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/password-manager:/app:cached
      - go_mod_cache_pass:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8051/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cloudity-network

  # Mail Directory (Phase 2) — domaines, boîtes, alias
  mail-directory-service:
    build:
      context: ./backend/mail-directory-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-mail-directory-service
    restart: unless-stopped
    ports:
      - "6050:8050"
    environment:
      - PORT=8050
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
      # Clé 32 bytes (64 hex) pour chiffrer les mots de passe IMAP/SMTP stockés. En prod, définir MAIL_PASSWORD_ENCRYPTION_KEY.
      - MAIL_PASSWORD_ENCRYPTION_KEY=${MAIL_PASSWORD_ENCRYPTION_KEY:-a1b2c3d4e5f6789012345678a1b2c3d4e5f6789012345678a1b2c3d4e5f67890}
      # OAuth Google (Gmail sans mot de passe d'application) : optionnel. Voir README section Mail / OAuth.
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:6080/mail/me/oauth/google/callback}
      - MAIL_OAUTH_FRONTEND_URL=${MAIL_OAUTH_FRONTEND_URL:-http://localhost:6001}
    volumes:
      - ./backend/mail-directory-service:/app:cached
      - go_mod_cache_mail:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8050/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cloudity-network

  # Calendar (base) — événements, à développer
  calendar-service:
    build:
      context: ./backend/calendar-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-calendar-service
    restart: unless-stopped
    ports:
      - "6052:8052"
    environment:
      - PORT=8052
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/calendar-service:/app:cached
      - go_mod_cache_calendar:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8052/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cloudity-network

  # Notes (base) — bloc-notes, à développer
  notes-service:
    build:
      context: ./backend/notes-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-notes-service
    restart: unless-stopped
    ports:
      - "6053:8053"
    environment:
      - PORT=8053
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/notes-service:/app:cached
      - go_mod_cache_notes:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8053/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cloudity-network

  # Tasks (base) — tâches / to-do, à développer
  tasks-service:
    build:
      context: ./backend/tasks-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-tasks-service
    restart: unless-stopped
    ports:
      - "6054:8054"
    environment:
      - PORT=8054
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/tasks-service:/app:cached
      - go_mod_cache_tasks:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8054/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cloudity-network

  # Drive (base) — fichiers et dossiers en cascade (type Google Drive / Nextcloud)
  drive-service:
    build:
      context: ./backend/drive-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-drive-service
    restart: unless-stopped
    ports:
      - "6055:8055"
    environment:
      - PORT=8055
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/drive-service:/app:cached
      - go_mod_cache_drive:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8055/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cloudity-network

  # Contacts — carnet d'adresses (type Google Contacts), liaison Mail
  contacts-service:
    build:
      context: ./backend/contacts-service
      dockerfile: Dockerfile.dev
    container_name: cloudity-contacts-service
    restart: unless-stopped
    ports:
      - "6056:8056"
    environment:
      - PORT=8056
      - GOTOOLCHAIN=auto
      - GIN_MODE=release
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD:-cloudity_secure_password_2025}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=disable
    volumes:
      - ./backend/contacts-service:/app:cached
      - go_mod_cache_contacts:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O/dev/null", "http://127.0.0.1:8056/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - cloudity-network

  admin-dashboard:
    build:
      context: ./frontend/admin-dashboard
      dockerfile: Dockerfile.dev
    container_name: cloudity-main-frontend
    restart: unless-stopped
    ports:
      - "6001:3000"
    environment:
      - NODE_ENV=development
      # Appel direct au gateway depuis le navigateur (évite 401 sur /drive, /pass, etc.).
      # Pour ouvrir sur smartphone : mets l’IP de ta machine (ex. VITE_API_URL=http://192.168.1.5:6080)
      # et ouvre sur le téléphone http://<TON_IP>:6001
      - VITE_API_URL=${VITE_API_URL:-http://localhost:6080}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend/admin-dashboard:/app:cached
      - node_modules_cache:/app/node_modules
    depends_on:
      - api-gateway
    networks:
      - cloudity-network

  # Adminer pour gestion base de données (développement)
  adminer:
    image: adminer:4-standalone
    container_name: cloudity-adminer
    restart: unless-stopped
    ports:
      - "6083:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      - postgres
    networks:
      - cloudity-network
    profiles:
      - dev

  # Redis Commander (dev) : connexion au service redis du réseau Docker (host=redis, pas localhost)
  # Format REDIS_HOSTS = label:host:port:db:password (voir entrypoint joeferner/redis-commander)
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: cloudity-redis-commander
    restart: unless-stopped
    ports:
      - "6084:8081"
    environment:
      # Obligatoire : host "redis" = nom du service sur le réseau Docker (sinon l'image utilise localhost)
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_secure_password_2025}"
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cloudity-network
    profiles:
      - dev

networks:
  cloudity-network:
    driver: bridge
    name: cloudity-network

volumes:
  postgres_data:
    driver: local
    name: cloudity-postgres-data
  redis_data:
    driver: local
    name: cloudity-redis-data
  go_mod_cache_auth:
    driver: local
    name: cloudity-go-mod-cache-auth
  go_mod_cache_gateway:
    driver: local
    name: cloudity-go-mod-cache-gateway
  python_cache:
    driver: local
    name: cloudity-python-cache
  node_modules_cache:
    driver: local
    name: cloudity-node-modules-cache
  go_mod_cache_pass:
    driver: local
    name: cloudity-go-mod-cache-pass
  go_mod_cache_mail:
    driver: local
    name: cloudity-go-mod-cache-mail
  go_mod_cache_calendar:
    driver: local
    name: cloudity-go-mod-cache-calendar
  go_mod_cache_notes:
    driver: local
    name: cloudity-go-mod-cache-notes
  go_mod_cache_tasks:
    driver: local
    name: cloudity-go-mod-cache-tasks
  go_mod_cache_drive:
    driver: local
    name: cloudity-go-mod-cache-drive
  go_mod_cache_contacts:
    driver: local
    name: cloudity-go-mod-cache-contacts