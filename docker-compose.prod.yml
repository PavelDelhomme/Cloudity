# Overrides pour l'environnement de production Cloudity
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Ou: make prod
# Les services adminer et redis-commander ne sont pas démarrés (pas de profil dev).

version: "3.8"

services:
  postgres:
    restart: always
    # En prod, on peut limiter les ports exposés ou ne pas les exposer (accès interne uniquement)
    ports:
      - "6042:5432"

  redis:
    restart: always
    ports:
      - "6079:6379"

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile.dev
    restart: always
    environment:
      - GO_ENV=production
      # Volume nommé `cloudity_auth_keys` monté ici pour que les paires
      # Ed25519 et RSA (rétrocompat RS256) survivent aux redéploiements.
      # Sinon, chaque rebuild régénère les clés et invalide TOUS les JWT.
      - AUTH_KEYS_DIR=/var/lib/cloudity/auth-keys
    volumes:
      - cloudity_auth_keys:/var/lib/cloudity/auth-keys

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - "6080:8000"
    environment:
      - GO_ENV=production
      # Lecture seule des clés publiques émises par auth-service.
      - JWT_PUBLIC_KEY_PATH=/var/lib/cloudity/auth-keys/public.pem
      - JWT_ED25519_PUBLIC_KEY_PATH=/var/lib/cloudity/auth-keys/public_ed25519.pem
    volumes:
      - cloudity_auth_keys:/var/lib/cloudity/auth-keys:ro

  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile.dev
    restart: always
    environment:
      - PYTHON_ENV=production

  cloudity-web:
    build:
      context: ./frontend
      dockerfile: apps/cloudity-web/Dockerfile
    restart: always
    ports:
      - "6001:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://api.cloudity.io

volumes:
  cloudity_auth_keys:
    name: cloudity_auth_keys
    # Volume nommé qui persiste les paires de clés JWT Ed25519 + RS256 legacy
    # entre redéploiements (cf. auth-service AUTH_KEYS_DIR + api-gateway
    # JWT_*_KEY_PATH). À sauvegarder via le runner backup offsite.
