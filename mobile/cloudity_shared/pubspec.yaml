name: cloudity_shared
description: >
  Bibliothèque Dart partagée pour les apps Flutter Cloudity (mail, drive, photos, pass, admin).
  Contient les helpers HTTP alignés sur `getAuthHeaders` côté web ainsi que le client 2FA
  unifié (`Auth2FAClient`) pour `/auth/2fa/verify`.
publish_to: 'none'

version: 0.2.0

environment:
  sdk: ^3.11.4

dependencies:
  http: ^1.2.2

dev_dependencies:
  test: ^1.25.7
