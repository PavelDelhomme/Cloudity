# HTTPS interne Cloudity : surcouche `docker-compose.yml` + step-ca.
#
# Ce override **ne casse rien** tant qu'on ne le charge pas explicitement :
#   make up-https-internal     # active Postgres TLS + Redis TLS
#
# Pré-requis :
#   make mtls-up && make seed-mtls
#   make mtls-issue-postgres && make mtls-issue-redis
#   make mtls-chown-internal-certs   # ajuste uid des fichiers PEM pour bind-mount
#
# Voir docs/securite/MTLS-INTERNE.md et docs/securite/AUDIT-SECURITE.md § 6 bis.

services:
  postgres:
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/tls/cert.pem"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/tls/key.pem"
      - "-c"
      - "ssl_ca_file=/var/lib/postgresql/tls/ca.pem"
      - "-c"
      - "ssl_min_protocol_version=TLSv1.2"
    volumes:
      - ./infrastructure/step-ca/issued/postgres/cert.pem:/var/lib/postgresql/tls/cert.pem:ro
      - ./infrastructure/step-ca/issued/postgres/key.pem:/var/lib/postgresql/tls/key.pem:ro
      - ./infrastructure/step-ca/issued/postgres/ca.pem:/var/lib/postgresql/tls/ca.pem:ro

  redis:
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--tls-port"
      - "6379"
      - "--port"
      - "0"
      - "--tls-cert-file"
      - "/run/step/cert.pem"
      - "--tls-key-file"
      - "/run/step/key.pem"
      - "--tls-ca-cert-file"
      - "/run/step/ca.pem"
      - "--tls-auth-clients"
      - "no"
    volumes:
      - ./infrastructure/step-ca/issued/redis:/run/step:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --tls --cacert /run/step/ca.pem -a \"$$REDIS_PASSWORD\" ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db-migrate:
    environment:
      PGSSLMODE: verify-ca
      PGSSLROOTCERT: /run/step/ca.pem
    volumes:
      - ./infrastructure/step-ca/issued/postgres/ca.pem:/run/step/ca.pem:ro

  auth-service:
    environment:
      MTLS_MODE: "permissive"
      MTLS_CERT_FILE: "/run/step/cert.pem"
      MTLS_KEY_FILE: "/run/step/key.pem"
      MTLS_CA_FILE: "/run/step/ca.pem"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=verify-ca&sslrootcert=/run/step/postgres-ca.pem"
      REDIS_URL: "redis:6379"
      REDIS_TLS: "1"
      REDIS_TLS_CA: "/run/step/redis-ca.pem"
    volumes:
      - ./infrastructure/step-ca/issued/auth-service/cert.pem:/run/step/cert.pem:ro
      - ./infrastructure/step-ca/issued/auth-service/key.pem:/run/step/key.pem:ro
      - ./infrastructure/step-ca/issued/auth-service/ca.pem:/run/step/ca.pem:ro
      - ./infrastructure/step-ca/issued/postgres/ca.pem:/run/step/postgres-ca.pem:ro
      - ./infrastructure/step-ca/issued/redis/ca.pem:/run/step/redis-ca.pem:ro

  api-gateway:
    environment:
      AUTH_SERVICE_URL: "https://auth-service:8081"
      ADMIN_SERVICE_URL: "https://admin-service:8082"
      MTLS_MODE: "permissive"
      MTLS_CERT_FILE: "/run/step/cert.pem"
      MTLS_KEY_FILE: "/run/step/key.pem"
      MTLS_CA_FILE: "/run/step/ca.pem"
    volumes:
      - ./infrastructure/step-ca/issued/api-gateway/cert.pem:/run/step/cert.pem:ro
      - ./infrastructure/step-ca/issued/api-gateway/key.pem:/run/step/key.pem:ro
      - ./infrastructure/step-ca/issued/api-gateway/ca.pem:/run/step/ca.pem:ro

  admin-service:
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=verify-ca&sslrootcert=/run/step/postgres-ca.pem"
      MTLS_MODE: "permissive"
      MTLS_CERT_FILE: "/run/step/cert.pem"
      MTLS_KEY_FILE: "/run/step/key.pem"
      MTLS_CA_FILE: "/run/step/ca.pem"
    volumes:
      - ./infrastructure/step-ca/issued/admin-service/cert.pem:/run/step/cert.pem:ro
      - ./infrastructure/step-ca/issued/admin-service/key.pem:/run/step/key.pem:ro
      - ./infrastructure/step-ca/issued/admin-service/ca.pem:/run/step/ca.pem:ro
      - ./infrastructure/step-ca/issued/postgres/ca.pem:/run/step/postgres-ca.pem:ro
    command: ["./start.sh"]

  passwords-service:
