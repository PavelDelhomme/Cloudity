      DATABASE_URL: "postgresql://${POSTGRES_USER:-cloudity_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudity}?sslmode=verify-ca&sslrootcert=/run/step/ca.pem"
